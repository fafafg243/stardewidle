<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#1e272e,#2f3640);
    color:white;
    padding:40px;
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

.inputContainer{
    position:relative;
    display:block;
    max-width:900px;
    margin:0 auto;
}

input{
    padding:12px;
    width:100%;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#27ae60;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#2ecc71;
}

/* PREVIEW AUTOCOMPLETE */
#preview{
    margin-top:10px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:500px;
    overflow-y:auto;
}

.profileCard{
    width:100%; /* karta zabírá celou šířku kontejneru */
    background:#34495e;
    border-radius:12px;
    padding:12px;
    display:flex;
    gap:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.4);
    cursor:pointer;
    transition:transform 0.2s, box-shadow 0.2s;
}

.profileCard:hover{
    transform:scale(1.02);
    box-shadow:0 12px 25px rgba(0,0,0,0.6);
}

.profileImage{
    width:140px;
    height:140px;
    border-radius:8px;
    background:#2c3e50;
    background-size:cover;
    background-position:center;
    flex-shrink:0;
}

.profileInfo{
    text-align:left;
    font-size:13px;
    flex-grow:1;

    display:grid;
    grid-template-columns: 1fr 1fr; /* dva sloupce */
    gap:6px 12px;
}

.profileInfo h3{
    grid-column: span 2; /* jméno přes celou šířku */
    margin:0 0 4px 0;
}
.stat{
    padding:4px;
    border-radius:6px;
    font-weight:bold;
    margin:0;
    text-align:center; /* zarovná text doprostřed */
    background:#1e272e;
}

.green{ background:#2ecc71; }
.red{ background:#e74c3c; }
.orange{ background:#f39c12; }

.giftContainer{
    margin-top:4px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;

    grid-column: span 2; /* roztáhne přes celou šířku */
}

.gift{
    background:#2c3e50;
    padding:2px 4px;
    border-radius:6px;
    display:flex;
    align-items:center;
    gap:4px;
    font-size:11px;
}

.gift img{
    width:20px;
    height:20px;
}

/* VÝSLEDKY */
#results{
    margin-top:20px;
    display:flex;
    flex-direction:column; /* každý guess pod sebou */
    gap:12px;
}

#results .profileCard{
    width:100%; /* roztažené na celou šířku */
}
</style>

const seasons={Spring:0,Summer:1,Fall:2,Winter:3};

function normalize(s){return s.toLowerCase().trim();}

function parseBirthday(b){
    if(!b||b==="Unknown") return null;
    let p=b.split(" ");
    if(seasons[p[0]]!==undefined) return seasons[p[0]]*28+parseInt(p[1]);
    if(seasons[p[1]]!==undefined) return seasons[p[1]]*28+parseInt(p[0]);
    return null;
}

let target=villagers[Math.floor(Math.random()*villagers.length)];
console.log("TARGET:",target.name);

function createProfileCard(character){
    let card=document.createElement("div");
    card.className="profileCard";

    let imgDiv=document.createElement("div");
    imgDiv.className="profileImage";
    imgDiv.style.backgroundImage=`url(https://via.placeholder.com/150)`; // dej reálné fotky

    let info=document.createElement("div");
    info.className="profileInfo";

    info.innerHTML=`
        <h3>${character.name}</h3>
        <div class="stat">🎂 ${character.Birthday}</div>
        <div class="stat">🏠 ${character["lives in"]||"Unknown"}</div>
        <div class="stat">💍 ${character.marriage}</div>
        <div class="stat">❤️ Loved Gifts</div>
    `;

    let giftContainer=document.createElement("div");
    giftContainer.className="giftContainer";

    character["liked gifts"].forEach(g=>{
        let gift=document.createElement("div");
        gift.className="gift";
        gift.innerHTML=`<img src="https://via.placeholder.com/20"> ${g}`;
        giftContainer.appendChild(gift);
    });

    info.appendChild(giftContainer);
    card.appendChild(imgDiv);
    card.appendChild(info);

    card.addEventListener("click",()=>{
        document.getElementById("guessInput").value=character.name;
        document.getElementById("preview").innerHTML="";
    });

    return card;
}

function handleAutocomplete(){
    let value=document.getElementById("guessInput").value;
    let preview=document.getElementById("preview");
    preview.innerHTML="";

    if(value.length<1) return;

    let matches=villagers.filter(v=>normalize(v.name).startsWith(normalize(value)));
    if(matches.length===0) return;

    matches.forEach(m=>{
        preview.appendChild(createProfileCard(m));
    });
}

function makeGuess(){
    let input=document.getElementById("guessInput").value;
    let guess=villagers.find(v=>normalize(v.name)===normalize(input));
    if(!guess){alert("Postava nenalezena.");return;}

    let card=createProfileCard(guess);
    let stats=card.querySelectorAll(".stat");

    let guessDay=parseBirthday(guess.Birthday);
    let targetDay=parseBirthday(target.Birthday);

    if(guess.Birthday === "Unknown"){
    stats[0].classList.add("green");
}
let guessUnknown = guess.Birthday === "Unknown";
let targetUnknown = target.Birthday === "Unknown";

if(guessUnknown && targetUnknown){
    stats[0].classList.add("green");
}
else if(guessUnknown || targetUnknown){
    stats[0].classList.add("red");
}
else{
    if(guessDay === targetDay){
        stats[0].classList.add("green");
    }
    else if(guessDay < targetDay){
        stats[0].classList.add("red");
        stats[0].innerHTML += " ↑";
    }
    else{
        stats[0].classList.add("red");
        stats[0].innerHTML += " ↓";
    }
}

    if(guess["lives in"]===target["lives in"]) stats[1].classList.add("green");
    else stats[1].classList.add("red");

    if(guess.marriage===target.marriage) stats[2].classList.add("green");
    else stats[2].classList.add("red");

    let overlap=guess["liked gifts"].some(g=>target["liked gifts"].includes(g));
    if(overlap) stats[3].classList.add("orange");
    else stats[3].classList.add("red");

    document.getElementById("results").appendChild(card);

    if(normalize(guess.name)===normalize(target.name)){
        setTimeout(()=>alert("🎉 VYHRÁL JSI!"),200);
    }

    document.getElementById("guessInput").value="";
    document.getElementById("preview").innerHTML="";
}
